<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>座標校準工具</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f9f6f0; }
    h2 { color: #c8860a; }
    .container { position: relative; display: inline-block; }
    img { width: 800px; max-width: 100%; display: block; }
    .dot { position: absolute; width: 16px; height: 16px;
           background: red; border-radius: 50%;
           transform: translate(-50%, -50%); pointer-events: none; }
    #log { margin-top: 20px; background: #fff; padding: 16px;
           border: 1px solid #ddd; border-radius: 8px;
           font-family: monospace; font-size: 13px; white-space: pre; }
    p { color: #555; }
  </style>
</head>
<body>
  <h2>🐾 座標校準工具</h2>
  <p>依序點擊圖片上的：頭部 → 頸部 → 背部 → 臀部 → 胸部 → 後腿<br>
     點完後把下方的座標複製給我！</p>

  <div class="container" id="container">
    <img src="dog.png" id="dogImg" alt="狗狗">
  </div>

  <div id="log">點擊圖片開始記錄座標...</div>

  <script>
    const labels = ["頭部","頸部","背部","臀部","胸部","後腿"];
    let clicks = [];
    const container = document.getElementById("container");
    const img = document.getElementById("dogImg");
    const log = document.getElementById("log");

    container.addEventListener("click", (e) => {
      if (clicks.length >= labels.length) return;

      const rect = img.getBoundingClientRect();
      const containerRect = container.getBoundingClientRect();

      // 相對於圖片的百分比
      const x = ((e.clientX - rect.left) / rect.width * 100).toFixed(2);
      const y = ((e.clientY - rect.top) / rect.height * 100).toFixed(2);

      const label = labels[clicks.length];
      clicks.push({ label, x, y });

      // 畫紅點
      const dot = document.createElement("div");
      dot.className = "dot";
      dot.style.left = x + "%";
      dot.style.top = y + "%";
      container.appendChild(dot);

      // 更新記錄
      log.textContent = clicks.map(c =>
        `{ id: "${c.label}", top: "${c.y}%", left: "${c.x}%" }`
      ).join(",\n");

      if (clicks.length === labels.length) {
        log.textContent += "\n\n✅ 全部完成！把上面的內容複製給 Claude。";
      }
    });
  </script>
</body>
</html>
